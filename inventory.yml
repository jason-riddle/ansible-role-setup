# yamllint disable rule:line-length
---
# See: https://docs.ansible.com/ansible/latest/inventory_guide/intro_inventory.html#connecting-to-hosts-behavioral-inventory-parameters
all:
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
  children:
    managed:
      hosts:
        debian-vm:
          ansible_host: debian-vm.greyhound-little.ts.net
          # ansible_user: root
          ansible_user: ansible
          ansible_port: 2222

        tinypilotkvm:
          ansible_host: tinypilotkvm.greyhound-little.ts.net
          ansible_user: ansible
          ansible_port: 22

    local:
      hosts:
        localhost:
          ansible_connection: local
