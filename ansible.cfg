# ==============================================================================
# ANSIBLE CONFIGURATION
# ==============================================================================

# REF: https://docs.ansible.com/ansible/latest/reference_appendices/config.html

# ==============================================================================
# DEFAULTS
# ==============================================================================
[defaults]

# Inventory configuration
inventory = inventory.yml

# Python interpreter
interpreter_python = auto_silent

# Output configuration
stdout_callback = default
callback_result_format = yaml
bin_ansible_callbacks = True

# Disable deprecation warnings
deprecation_warnings = False

# ==============================================================================
# PERFORMANCE OPTIMIZATIONS
# ==============================================================================

# Parallel execution - increase forks for better parallelism
forks = 20

# Fact gathering - explicit gathering for benchmark consistency
gathering = explicit

# Strategy - use linear strategy for reliability
strategy = linear

# Internal poll interval - async task polling interval in seconds
internal_poll_interval = 0.1

# Task timeout - prevent hanging tasks
task_timeout = 300

# Connection timeout - faster failure detection
timeout = 30

# Retry files - disable for performance
retry_files_enabled = false

# Host key checking - disable for trusted environments (performance gain)
host_key_checking = false

# ==============================================================================
# SSH CONNECTION (Basic Settings)
# ==============================================================================
[ssh_connection]

# Enable pipelining to reduce network operations
pipelining = true

# Connection timeout
connect_timeout = 30

# ==============================================================================
# PERSISTENT CONNECTION
# ==============================================================================
[persistent_connection]

# Persistent connection settings for performance
connect_timeout = 30
command_timeout = 30
